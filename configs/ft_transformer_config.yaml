# -*- coding: utf-8 -*-
# FT-Transformer 模型配置文件（基础配置 - 快速实验）

# ====================================
# 模型配置
# ====================================
model:
  name: ft_transformer    # 模型名称
  lr: 0.001               # 学习率（Transformer通常需要较小学习率）
  epochs: 50             # 训练轮数
  params:                # FT-Transformer 模型特定参数
    d_token: 128          # Token embedding维度（基础配置）
    n_blocks: 2          # Transformer block数量（基础配置）
    n_heads: 4           # 多头注意力的头数
    d_ffn: 256           # Feed-Forward Network维度 (d_token × 4)
    attention_dropout: 0.2  # Attention层的dropout比例
    ffn_dropout: 0.3        # FFN层的dropout比例

# ====================================
# 数据配置
# ====================================
data:
  data_dir: data/processed                    # 数据目录路径
  iv_path: data/processed/iv_results.xlsx     # IV 结果文件路径
  batch_size: 128                             # 批次大小（基础配置使用较大batch）
  top_n_features: null                          # 选择 IV 值最高的前 20 个特征（快速实验）
  data_type: woe                              # 数据类型: 'woe' 或 'raw'

# ====================================
# 训练配置
# ====================================
training:
  output_dir: model_param                    # 模型保存目录
  seed: 42                                   # 随机种子（保证实验可复现性）
  tensorboard:
    enabled: true                            # 是否启用 TensorBoard
    log_dir: runs                            # TensorBoard 日志保存目录
    log_interval: 1                          # 每隔多少个 epoch 记录一次

# ====================================
# 评估配置
# ====================================
evaluation:
  top_percent: 0.3                            # 选择排名前 N% 的样本计算利润
  model_type: classification                  # 模型类型: 'classification' 或 'regression'
  threshold: 0.2                              # 分类阈值（仅二分类模型使用）
  output_file: evaluation_results.csv         # 评估结果输出文件
